name: Lightweight gate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lightweight-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - name: Install locked Python dependencies
        shell: pwsh
        run: python -m pip install --disable-pip-version-check -r requirements-lock.txt
      - name: Run repository lightweight gate
        shell: pwsh
        run: .\common\verify_lightweight.ps1 -PythonExe (Get-Command python).Source
